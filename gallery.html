<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
font-size:28px;
}

p{
color:#bbb;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:10px;
}

.box{
position:relative;
overflow:hidden;
border-radius:8px;
}

.box img{
width:100%;
height:200px;
object-fit:cover;
transition:0.4s;
}

.box:hover img{
transform:scale(1.1);
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:8px 16px;
border-radius:20px;
}

.full{
grid-column:1/3;
}

</style>

</head>

<body>

<h1>Selamat Datang</h1>
<p>Silahkan pilih album</p>

<div class="gallery">

<a href="album.html" class="box full">
<img src="https://picsum.photos/800/400?1">
<div class="text">Wedding</div>
</a>

<a href="album2.html" class="box">
<img src="https://picsum.photos/500/400?2">
<div class="text">Wisuda</div>
</a>

<a href="album3.html" class="box">
<img src="https://picsum.photos/500/400?3">
<div class="text">Prewedding</div>
</a>

<a href="#" class="box full">
<img src="https://picsum.photos/800/400?4">
<div class="text">Video</div>
</a>

</div>

</body>
</html>
