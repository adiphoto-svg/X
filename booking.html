<!DOCTYPE html>
<html>
<head>

}

<script>

let pesan = "Halo saya ingin booking fotografer%0A%0A"+
"Nama: "+nama+"%0A"+
"Tanggal: "+tanggal+"%0A"+

window.open("https://wa.me/6282349962035?text="+pesan)
}

</script>
