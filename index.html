<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADI PHOTO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

/* NAVBAR */

nav{
background:#000;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

nav div{
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
margin-right:15px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:black;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
}

.menu-toggle{
display:none;
font-size:28px;
cursor:pointer;
}

/* MOBILE */

@media (max-width:768px){

.menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:20px;
background:#111;
padding:20px;
border-radius:10px;
}

.menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

 }

/* HERO */

.hero{
height:60vh;
background:url("https://picsum.photos/1200/700") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero p{
color:#ddd;
}

.hero button{
margin-top:20px;
padding:10px 20px;
border:none;
background:white;
color:black;
border-radius:20px;
cursor:pointer;
}

/* GALERI */

.gallery{
max-width:900px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.box{
position:relative;
overflow:hidden;
border-radius:10px;
}

.box img{
width:100%;
height:220px;
object-fit:cover;
transition:0.4s;
}

.box:hover img{
transform:scale(1.1);
}

.text{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:5px 10px;
border-radius:10px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#111;
margin-top:40px;
}

</style>
</head>

<body>

<nav>

<h2>ADI PHOTO</h2>

<div>
<a href="index.html">Home</a>
<a href="paket.html">Paket</a>
<a href="booking.html">Booking Fotografer</a>
</div>

<section class="hero">
<h1>Fotografi Profesional</h1>
<p>Wedding • Wisuda • Prewedding</p>
<button>Lihat Galeri</button>
</section>

<section class="gallery">

<div class="box">
<img src="https://picsum.photos/400/300?1">
<div class="text">Wedding</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?2">
<div class="text">Wisuda</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?3">
<div class="text">Prewedding</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?4">
<div class="text">Couple</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?5">
<div class="text">Event</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?6">
<div class="text">Studio</div>
</div>
<nav>

<div class="logo">ADI PHOTO</div>

<div class="menu-toggle" onclick="toggleMenu()">
☰
</div>

<div class="menu" id="menu">
<a href="index.html">Home</a>
<a href="paket.html">Paket</a>
<a href="booking.html">Booking</a>
</div>

</nav>
</section>

<footer>
<h3>ADI PHOTO</h3>
<p>© 2026</p>
</footer>
<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

</script>
</body>
</html>
