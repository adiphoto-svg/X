<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADI PHOTO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(8px);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav-menu{
display:flex;
gap:25px;
}

.nav-menu a{
color:white;
text-decoration:none;
font-size:16px;
position:relative;
transition:0.3s;
}

.nav-menu a::after{
content:'';
position:absolute;
left:0;
bottom:-5px;
width:0;
height:2px;
background:#00ff9d;
transition:0.3s;
}

.nav-menu a:hover::after{
width:100%;
}

.nav-menu a:hover{
color:#00ff9d;
}

/* MOBILE MENU */

.menu-toggle{
display:none;
font-size:25px;
cursor:pointer;
}
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:9999;
letter-spacing:3px;
}

@media (max-width:768px){

.nav-menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:20px;
background:#111;
padding:20px;
border-radius:10px;
}

.nav-menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

}

/* HERO */

.hero{
height:60vh;
background:url("https://picsum.photos/1200/700") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero p{
color:#ddd;
}

.hero button{
margin-top:20px;
padding:10px 20px;
border:none;
background:white;
color:black;
border-radius:20px;
cursor:pointer;
}

/* GALERI */

.gallery{
max-width:900px;
margin:40px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.box{
position:relative;
overflow:hidden;
border-radius:10px;
opacity:0;
transform:translateY(40px);
transition:0.6s;
}

.box img{
width:100%;
height:220px;
object-fit:cover;
transition:0.4s;
}

.box:hover img{
transform:scale(1.1);
}

.text{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:5px 10px;
border-radius:10px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#111;
margin-top:40px;
}

/* WHATSAPP */

.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>
<div id="loader">
ADI PHOTO
</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">ADI PHOTO</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav-menu" id="menu">
<a href="#">Home</a>
<a href="#booking">Booking Fotografer</a>
<a href="#galeri">Galeri</a>
</div>

</div>

<!-- HERO -->

<section class="hero">
<h1 id="typing"></h1>
<p>Wedding • Wisuda • Prewedding</p>
<button onclick="scrollGaleri()">Lihat Galeri</button>
</section>

<!-- GALERI -->

<section class="gallery" id="galeri">

<div class="box">
<img src="https://picsum.photos/400/300?1">
<div class="text">Wedding</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?2">
<div class="text">Wisuda</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?3">
<div class="text">Prewedding</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?4">
<div class="text">Couple</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?5">
<div class="text">Event</div>
</div>

<div class="box">
<img src="https://picsum.photos/400/300?6">
<div class="text">Studio</div>
</div>

</section>
<section id="booking" style="padding:50px;text-align:center;background:#111;">

<h2>Booking Fotografer</h2>
<p>Silakan booking fotografer kami melalui WhatsApp</p>

<br>

<a href="https://wa.me/6282349962035?text=Halo%20saya%20ingin%20booking%20fotografer"
style="
background:#25D366;
color:white;
padding:15px 25px;
text-decoration:none;
border-radius:30px;
font-weight:bold;
">
Booking Sekarang
</a>

</section>

<!-- FOOTER -->

<footer>
<h3>ADI PHOTO</h3>
<p>© 2026</p>
</footer>

<a href="https://wa.me/6282349962035" class="wa">Chat</a>

<script>
let text="Fotografi Profesional";
let i=0;

function ketik(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(ketik,80);
}

}

ketik();

let cards=document.querySelectorAll(".box");

cards.forEach(card=>{

card.addEventListener("mousemove",(e)=>{

let x=e.offsetX;
let y=e.offsetY;

let rotateY=(x/card.clientWidth*20)-10;
let rotateX=(y/card.clientHeight*20)-10;

card.style.transform=`rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;

});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateY(0) rotateX(0)";
});

});

window.addEventListener("load",function(){

document.getElementById("loader").style.display="none";

});

/* MENU MOBILE */

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* SCROLL GALERI */

function scrollGaleri(){
document.getElementById("galeri").scrollIntoView({
behavior:"smooth"
});
}

/* POPUP FOTO */

let images=document.querySelectorAll(".box img");

images.forEach(img=>{

img.onclick=function(){

let popup=document.createElement("div");

popup.style.position="fixed";
popup.style.top="0";
popup.style.left="0";
popup.style.width="100%";
popup.style.height="100%";
popup.style.background="rgba(0,0,0,0.9)";
popup.style.display="flex";
popup.style.alignItems="center";
popup.style.justifyContent="center";

let foto=document.createElement("img");
foto.src=this.src;
foto.style.maxWidth="90%";
foto.style.maxHeight="90%";

popup.appendChild(foto);

popup.onclick=function(){
popup.remove();
}

document.body.appendChild(popup);

}

});

/* ANIMASI SCROLL */

let boxes=document.querySelectorAll(".box");

window.addEventListener("scroll",()=>{

boxes.forEach(box=>{

let pos=box.getBoundingClientRect().top;

if(pos<window.innerHeight-100){
box.style.opacity="1";
box.style.transform="translateY(0)";
}

});

});
window.addEventListener("scroll",function(){

let navbar=document.querySelector(".navbar");

if(window.scrollY>50){
navbar.style.background="#000";
navbar.style.boxShadow="0 5px 15px rgba(0,0,0,0.5)";
}else{
navbar.style.background="rgba(0,0,0,0.6)";
navbar.style.boxShadow="none";
}

});
</script>

</body>
</html>
