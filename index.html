<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADI Photo</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

/* NAVBAR */

nav{
background:#000;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:36px;
}

/* GALERI */

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
max-width:600px;
margin:auto;
}

.box{
position:relative;
overflow:hidden;
border-radius:10px;
}

.box img{
width:100%;
height:200px;
object-fit:cover;
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:8px 16px;
border-radius:20px;
}

.full{
grid-column:1/3;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#111;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<h2>ADI PHOTO</h2>

<div>
<a href="index.html">Home</a>
</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>Pilih Album</h1>
<p>Galeri foto untuk wedding dan event</p>

</section>

<!-- GALERI -->

<div class="gallery">

<a href="album.html" class="box full">
<img src="https://picsum.photos/800/400?1">
<div class="text">Wedding</div>
</a>

<a href="album2.html" class="box">
<img src="https://picsum.photos/500/400?2">
<div class="text">Wisuda</div>
</a>

<a href="album3.html" class="box">
<img src="https://picsum.photos/500/400?3">
<div class="text">Prewedding</div>
</a>

<a href="#" class="box full">
<img src="https://picsum.photos/800/400?4">
<div class="text">Video</div>
</a>

</div>

<!-- FOOTER -->

<footer>

<h3>ADI PHOTO</h3>
<p>© 2026</p>

</footer>

</body>
</html>
