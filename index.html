<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADI Photo</title>

<style>

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
padding:10px;
}

.box{
position:relative;
overflow:hidden;
border-radius:8px;
}

.box img{
width:100%;
height:200px;
object-fit:cover;
transition:0.4s;
}

.box:hover img{
transform:scale(1.1);
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:8px 16px;
border-radius:20px;
}

.full{
grid-column:1/3;
}
  
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}


/* NAVBAR */

nav{
background:#000;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:40px;
}

button{
background:white;
color:black;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
background:#111;
color:white;
}

</style>

</head>

<body>

<nav>

<h2>ADI PHOTO</h2>

<div>
<a href="index.html">Home</a>
</div>

</nav>

<section class="hero">

<h1>Website Fotografer Profesional</h1>

<p>Galeri foto untuk wedding dan event</p>

<a class="button" href="gallery.html">Lihat Galeri</a>

</section>

<footer>

<h3>ADI PHOTO</h3>

<p>© 2026</p>

</footer>

</body>
</html>
