<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Foto</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:white;
}

nav a{
margin-left:20px;
text-decoration:none;
color:black;
}

.gallery{
max-width:1100px;
margin:auto;
padding:50px 20px;
}

.masonry{
column-count:3;
column-gap:15px;
}

.masonry img{
width:100%;
margin-bottom:15px;
border-radius:10px;
cursor:pointer;
}

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<nav>

<h2>ADI PHOTO</h2>

<div>
<a href="index.html">Home</a>
<a href="gallery.html">Galeri</a>
<a href="login.html">Login</a>
</div>

</nav>

<div class="gallery">

<h1>Galeri Foto</h1>

<div class="masonry">

<img src="https://images.unsplash.com/photo-1519741497674-611481863552" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1504196606672-aef5c9cefc92" onclick="openLightbox(this)">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" onclick="openLightbox(this)">

</div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>

function openLightbox(img){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;

}

function closeLightbox(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
  </html>
